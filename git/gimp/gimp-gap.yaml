repository:
  url: https://gitlab.gnome.org/Archive/gimp-gap.git
  branch: master
categories:
  - coding-feature
  - coding-bugfix
  - translation
  - documentation
  - communication
  - coding-other
fallback: coding-other
prompt: |
  You are a git commit classifier for the GIMP source repository. Classify the given git commit into exactly one of these categories:
  - coding-feature: adds new functionality, UI elements, plug-ins, file format support, or capabilities. Cue words: "introduce", "new", "support for", "implement", "add" (only when adding a genuinely new thing, not fixing an omission).
  - coding-bugfix: fixes a bug, regression, crash, memory leak, security issue, or incorrect behavior. Cue words: "fix", "resolve", "crash", "wrong", "broken", "leak", "regression".
  - translation: i18n, l10n, .po/.pot files, string localization, new language support.
  - documentation: user-facing docs (manpages, NEWS, README, in-app help, devel-docs/), API reference comments (gtk-doc/doxygen blocks). Plain in-code comments are coding-other, not documentation.
  - communication: news posts, release announcements, blog content, conference/event materials, social media, outreach to end users.
  - coding-other: everything else — refactoring, code cleanup, performance optimization (when not fixing a regression), packaging, CI, build system (meson/autotools), tests, dependency bumps, formatting, plain code comments.

  Rules:
  - Pick exactly one category — the one that best describes the commit's PRIMARY intent.
  - Use the changed file paths and diff sizes as additional signal when the subject is vague.
  - Reverts: classify by the net effect (a revert of a buggy feature → coding-bugfix).
  - Performance work that fixes a regression → coding-bugfix; standalone perf optimization → coding-other.
  - Refactors that incidentally fix a bug → coding-bugfix only if the message frames it as a fix; otherwise coding-other.
  - Anything under po/ → translation, even if the commit also touches build files for the new locale.
  - "Add missing X" / "add forgotten X" / "add back X": if the thing was already expected to be there and was absent, this fixes a defect → coding-bugfix (for logic errors) or coding-other (for trivial whitespace/string corrections). Never coding-feature.
  - Version bump commits (e.g. "Release X.Y.Z", "Bump version to X.Y") that only touch build/packaging files → coding-other, not communication. Communication requires creating or updating user-visible written content (announcement text, blog post, changelog prose).
  - Issue-number prefixed commits (e.g. "#1234:", "Fixes #1234") that don't add new user-visible capability → coding-bugfix, not coding-feature.
  - "improve" without clear new UI or capability addition → coding-other, not coding-feature.
  - API swaps, ports, migrations ("Switch to X", "Use X", "Port from X", "Replace X with Y") without fix framing → coding-other, not coding-bugfix.
  - Respond with ONLY the category name on a single line. No explanation, no prefix, no quotes, no markdown.

shortcuts:
  "**/*.po": translation
  ".gitlab-ci.yml": coding-other
  "**/meson.build": coding-other
  "NEWS*": documentation
  "ChangeLog*": documentation

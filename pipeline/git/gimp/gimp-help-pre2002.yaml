repository:
  url: https://gitlab.gnome.org/Archive/gimp-help.git
  branch: master
categories:
  - coding-feature
  - coding-bugfix
  - translation
  - documentation
  - coding-other
fallback: coding-other
prompt: |
  You are a git commit classifier for the GIMP help documentation repository (pre-2002). This repo contains the GIMP user manual written in SGML — the .sgml files under help/C/ are the English user-facing help pages, and help/ja/ contains Japanese translations of the same content. Classify the given git commit into exactly one of these categories:
  - coding-feature: adds a new .sgml help page covering a feature or dialog that had no documentation at all before (net-new content, not filling in a placeholder stub).
  - coding-bugfix: corrects factually wrong or broken content in an existing help page; fixes broken SGML markup, misnamed files, bad cross-references; fixes a build script or tool that produces incorrect output.
  - translation: adds or updates translated help pages in a non-English language subdirectory (e.g. help/ja/).
  - documentation: routine writing, editing, expanding, proofreading, or reorganizing of existing English help pages; adding images to existing topics; filling in stub/placeholder files with real content.
  - coding-other: build system (Makefile.am, configure.in, autogen.sh, DSL stylesheets), format-conversion scripts, repo tooling, or any commit that does not change help content.

  Rules:
  - Pick exactly one category — the one that best describes the commit's PRIMARY intent.
  - ChangeLog is updated in nearly every commit as a convention; ignore it when determining category — classify by the other changed files.
  - Commits primarily touching .sgml files in help/C/ → documentation by default, unless the message clearly frames it as a bugfix or a net-new page.
  - "Fixed", "repaired", "corrected" applied to a help page → coding-bugfix. Routine expansion or proofreading of existing pages → documentation.
  - Adding a new .sgml file for a feature that previously had NO help page → coding-feature. Adding content to an existing page or stub → documentation.
  - Commits touching only build/script files (Makefile.am, configure.in, *.sh, *.py, *.dsl, *.c tools) → coding-other.
  - Respond with ONLY the category name on a single line. No explanation, no prefix, no quotes, no markdown.

shortcuts:
  "**/*.sgml": documentation
  "**/*.png": documentation
  "**/*.jpg": documentation
  "**/*.jpeg": documentation
  "**/*.gif": documentation
  "help/ja/**": translation
  "**/Makefile.am": coding-other
  "NEWS*": communication
shortcuts_ignore: []

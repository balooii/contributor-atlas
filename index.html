<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, shrink-to-fit=0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <title>Gathering</title>
    <link rel="stylesheet" href="src/styles.css" />
    <link rel="stylesheet" href="src/page.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme") || "system";
        if (t !== "system") document.documentElement.dataset.theme = t;
      })();
    </script>
    <script type="importmap">
      { "imports": { "d3": "./static/d3.v7.esm.js" } }
    </script>
  </head>
  <body>
    <nav>
      <span id="theme-picker"></span>
      <span id="contributor-search"></span>
      <a href="index.html" class="active">Gathering</a>
      <a href="pulse.html">Pulse</a>
      <a href="trails.html">Trails</a>
      <a href="ripples.html">Ripples</a>
      <a href="cornerstones.html">Cornerstones</a>
    </nav>
    <div id="chart-container"></div>

    <script type="module">
      import { gathering, mountThemePicker } from "./src/contributorAtlas.js";

      mountThemePicker(document.getElementById("theme-picker"));

      gathering(document.getElementById("chart-container"), {
        contributions: "data/gimp/contributions.csv",
        project: "data/gimp/project.json",
        search: document.getElementById("contributor-search"),
      });
    </script>
  </body>
</html>

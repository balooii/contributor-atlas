<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Embedding example</title>

    <link rel="stylesheet" href="src/styles.css" />

    <script type="importmap">
      { "imports": { "d3": "./static/d3.v7.esm.js" } }
    </script>

    <style>
      /* Each view is a plain box with a fixed size */
      body {
        max-width: 800px;
        margin: 0 auto;
      }
      .embed {
        width: 700px;
        height: 700px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      /* Test color overrides */
      #gathering {
        --c-bg: transparent;
        --c-text: green;
      }
      #gathering-wrapper .embed {
        border: none;
      }
      #gathering-wrapper {
        background-color: lightblue;
      }

      /* A partial-width container that clips its overflow.
	 test to see that dropdown flip side */
      #widgets {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        width: 500px;
        height: 300px;
        padding: 10px;
        overflow: hidden;
        background: black;
      }
      @media (prefers-color-scheme: light) {
        :root:not([data-theme="dark"]) #widgets {
          background: white;
        }
      }
      :root[data-theme="light"] #widgets {
        background: white;
      }
    </style>
  </head>
  <body>
    <h1>Theme picker and Contributor Search</h1>
    <div id="widgets">
      <span id="theme-picker-wrapper"></span>
      <span id="search-wrapper"></span>
    </div>

    <h1>Gathering <small>(container-scoped color overrides)</small></h1>
    <div id="gathering-wrapper">
      <div id="gathering" class="embed"></div>
    </div>

    <h1>Pulse</h1>
    <div id="pulse" class="embed"></div>

    <h1>Trails</h1>
    <div id="trails" class="embed"></div>

    <h1>Ripples</h1>
    <div id="ripples" class="embed"></div>

    <h1>Cornerstones</h1>
    <div id="cornerstones" class="embed"></div>

    <script type="module">
      import {
        gathering,
        pulse,
        trails,
        ripples,
        cornerstones,
        mountThemePicker,
      } from "./src/contributorAtlas.js";

      const data = {
        contributions: "data/gimp/contributions.csv",
        project: "data/gimp/project.json",
        highlights: "data/gimp/highlights.csv",
        enableControls: false,
      };

      mountThemePicker(document.getElementById("theme-picker-wrapper"));

      gathering(document.getElementById("gathering"), {
        ...data,
        search: document.getElementById("search-wrapper"),
      });
      pulse(document.getElementById("pulse"), data);
      trails(document.getElementById("trails"), data);
      ripples(document.getElementById("ripples"), data);
      cornerstones(document.getElementById("cornerstones"), data);
    </script>
  </body>
</html>

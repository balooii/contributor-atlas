<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, shrink-to-fit=0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <title>Ripples</title>
    <link rel="stylesheet" href="static/css/page.css" />
    <link rel="stylesheet" href="static/css/timeline-control.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme") || "system";
        if (t !== "system") document.documentElement.dataset.theme = t;
      })();
    </script>
    <script src="static/lib/d3.v7.js"></script>
  </head>
  <body>
    <nav>
      <a href="index.html">Gathering</a>
      <a href="pulse.html">Pulse</a>
      <a href="trails.html">Trails</a>
      <a href="ripples.html" class="active">Ripples</a>
      <a href="cornerstones.html">Cornerstones</a>
    </nav>
    <div id="chart-container"></div>
    <div id="controls"></div>

    <script type="module">
      import "./src/theme.js";
      import { createRipples } from "./src/createRipples.js";
      import { bootstrapPage } from "./src/pageBootstrap.js";
      import { createTimelineControl } from "./src/createTimelineControl.js";
      import { createContributorSearch } from "./src/createContributorSearch.js";

      const container = document.getElementById("chart-container");
      const Visual = createRipples(container)
        .width(container.offsetWidth)
        .height(container.offsetHeight);

      bootstrapPage({
        files: [
          { path: "data/gimp/contributions.csv", type: "csv" },
          { path: "data/gimp/project.json" },
        ],
        onReady: ([contributions, project]) => {
          Visual.project(project);
          const stored = createTimelineControl.loadRange();
          if (stored) Visual.setRange(stored.start, stored.end);
          Visual([
            contributions,
            project.category_colors,
            project.category_groups,
          ]);

          createTimelineControl(document.getElementById("controls"))
            .chapters(project.chapters || [])
            .categories(true)
            .attach(Visual);

          createContributorSearch(
            document.querySelector("nav"),
            Visual,
            contributions,
          );

          Visual.width(container.offsetWidth)
            .height(container.offsetHeight)
            .resize();
        },
        onResize: () =>
          Visual.width(container.offsetWidth)
            .height(container.offsetHeight)
            .resize(),
      });
    </script>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, shrink-to-fit=0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <title>Pulse</title>
    <link rel="stylesheet" href="css/page.css" />
    <link rel="stylesheet" href="css/timeline-control.css" />
    <script src="pageTheme.js"></script>
    <script src="lib/d3.v7.js"></script>
    <script src="createTooltip.js"></script>
    <script src="chartBase.js"></script>
    <script src="createPulse.js"></script>
    <script src="createTimelineControl.js"></script>
    <script src="pageBootstrap.js"></script>
  </head>
  <body>
    <nav>
      <a href="index.html">Gathering</a>
      <a href="pulse.html" class="active">Pulse</a>
      <a href="trails.html">Trails</a>
      <a href="ripples.html">Ripples</a>
      <a href="cornerstones.html">Cornerstones</a>
    </nav>

    <div id="chart-container"></div>
    <div id="controls"></div>

    <script>
      const container = document.getElementById("chart-container");
      const Visual = createPulse(container);

      bootstrapPage({
        files: [
          { path: "data/gimp/contributions.csv", type: "csv" },
          {
            path: "data/gimp/highlights.csv",
            type: "csv",
            optional: true,
          },
          { path: "data/gimp/categories.json" },
          { path: "data/gimp/chapters.json", optional: true },
        ],
        onReady: ([contributions, highlights, categories, chapters]) => {
          const stored = createTimelineControl.loadRange();
          if (stored) Visual.setRange(stored.start, stored.end);
          Visual([contributions, highlights, categories]);
          createTimelineControl(document.getElementById("controls"))
            .chapters(chapters || [])
            .attach(Visual);
          Visual.resize();
        },
        onResize: () => Visual.resize(),
      });
    </script>
  </body>
</html>

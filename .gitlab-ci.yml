pages:
  stage: deploy
  image: node:22-alpine
  script:
    - apk add --no-cache brotli
    - npm ci
    - npm run build:release
    - mv dist public
    - |
      find public -type f \( -name "*.js" -o -name "*.css" -o -name "*.csv" -o -name "*.json" -o -name "*.png" -o -name "*.jpg" \) | while read f; do
        hash=$(md5sum "$f" | cut -c1-12)
        dir=$(dirname "$f")
        base=$(basename "$f")
        ext="${base##*.}"
        name="${base%.*}"
        newname="${name}.${hash}.${ext}"
        mv "$f" "${dir}/${newname}"
        find public -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" \) -exec sed -i "s|\b${base}\b|${newname}|g" {} \;
      done
    - find public -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.csv" \) -exec gzip -k "{}" \;
    - find public -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.csv" \) -exec brotli --keep "{}" \;
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
